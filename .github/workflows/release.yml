name: release

on:
  push:
    tags: ["v*.*.*"]

jobs:
  build-and-publish:
    name: Build + publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/quantum-ml-comparator/
    permissions:
      # OIDC for PyPI Trusted Publishing
      id-token: write
      # Creating the GitHub release
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distribution metadata
        run: twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        # No password / token needed — configured as a PyPI Trusted Publisher
        # linked to orbion-life/quantum-ml-comparator + workflow release.yml + environment pypi.

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
          files: |
            dist/*.tar.gz
            dist/*.whl
