name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff check (qmc package)
        run: ruff check qmc/ --select E,F,W --ignore E501,E402,E731,F841

      - name: Run ruff check (tests, relaxed)
        run: ruff check tests/ --select E9,F63,F7,F82

      - name: Syntax check
        run: python -m compileall qmc/ tests/

      - name: Static type check (mypy, advisory)
        # Advisory during progressive type-hint adoption — does not block CI.
        # Will be made blocking once every public-API module has hints.
        continue-on-error: true
        run: mypy qmc/
