name: tests

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/figures/**"
      - "CITATION.cff"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"
      - "ROADMAP.md"
      - "SECURITY.md"
      - ".gitignore"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "examples/figures/**"
      - "CITATION.cff"
      - "CHANGELOG.md"
      - "CODE_OF_CONDUCT.md"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "README.md"
      - "ROADMAP.md"
      - "SECURITY.md"
      - ".gitignore"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=qmc --cov-report=xml --cov-report=term -v tests/

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-qmc
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Check for proprietary references
        run: |
          set +e
          FOUND=$(grep -ri "biolip\|ligand.api\|ligand_api\|receptor_dir\|RECEPTOR_DIR\|LIGAND_DIR\|binding.site\|binding_site\|250k_biolip\|BIOLIP_TSV\|protein-ligand" --include="*.py" --include="*.md" --include="*.toml" . 2>/dev/null)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Found proprietary references:"
            echo "$FOUND"
            exit 1
          fi
          echo "OK: No proprietary references found."
